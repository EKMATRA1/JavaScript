<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synx Bag</title>
    <link rel="stylesheet" href="synx bag.css">
</head>
<body>
    <main>
        <button class="bag-button" onclick="cartQuatity++; document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuatity} items`;">Add to Bag</button>
        <button class="wish-button" onclick="cartQuatity--; document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuatity} items`;">Move to Wishlist</button>

        <button class="bag-button" onclick="cartQuatity+=2; document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuatity} items`;">Add 1+1 Sale Item</button>

        <h1 id="cart-summary"></h1>


        <script>
            let cartQuatity = 0;
            document.querySelector('#cart-summary').innerText = 'Your Bag has ' + cartQuatity + ' items';

            const pi = 3.14159265359;
            let radius = 4;
            console.log(pi*radius*radius);
        </script>
    </main>
</body>
</html>
